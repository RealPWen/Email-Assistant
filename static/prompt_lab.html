<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepMail AI - Prompt Lab</title>
    <link rel="stylesheet" href="/static/css/styles.css?v=2.2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .app-container {
            display: flex;
            height: 100vh;
            background: #f8f9fa; /* Assuming light theme default */
        }
        
        .main-content {
            flex: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
        }

        .header {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .header h1 {
            font-size: 1.8rem;
            color: #2c3e50;
        }

        .editor-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .skill-select {
            padding: 0.5rem;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 1rem;
            background: #f8f9fa;
        }

        .btn-group button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-left: 0.5rem;
            transition: all 0.2s;
        }

        .btn-primary { background: #3498db; color: white; }
        .btn-primary:hover { background: #2980b9; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        
        .toast {
            display: none;
            color: #27ae60;
            font-weight: bold;
            margin-left: 10px;
        }

        #prompt-editor {
            flex: 1;
            width: 100%;
            padding: 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            resize: none;
            background: #fdfdfd;
            line-height: 1.5;
            min-height: 400px;
        }

        #prompt-editor:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        /* Chat Sidebar styles loosely mimicking deepseek-dashboard */
        .chat-container {
            width: 350px;
            background: white;
            border-left: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            box-shadow: -4px 0 15px rgba(0,0,0,0.03);
            z-index: 100;
        }

        .chat-header {
            padding: 1.5rem;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #2ecc71;
            border-radius: 50%;
            display: inline-block;
        }

        .chat-header h3 {
            margin: 0;
            font-size: 1.1rem;
            color: #2c3e50;
        }

        .messages {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message.system {
            background: #f1f3f5;
            color: #495057;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .message.user {
            background: #3498db;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .input-area {
            padding: 1rem;
            background: #f8f9fa;
            border-top: 1px solid #e2e8f0;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: white;
            border: 1px solid #ced4da;
            border-radius: 24px;
            padding: 0.3rem;
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            padding: 0.5rem 1rem;
            outline: none;
            background: transparent;
        }

        .input-wrapper button {
            background: #3498db;
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .input-wrapper button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }

        .input-wrapper button:hover:not(:disabled) {
            background: #2980b9;
        }

        .typing-indicator {
            display: none;
            padding: 10px;
            color: #7f8c8d;
            font-size: 0.9rem;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <i class="fas fa-envelope-open-text"></i>
                <span>DeepMail</span>
            </div>
            <ul class="folder-list">
                <li onclick="window.location.href='/'"><div class="folder-item"><i class="fas fa-inbox"></i> <span>收件箱</span></div></li>
                <li onclick="window.location.href='/todo'"><div class="folder-item"><i class="fas fa-tasks"></i> <span>待办事项</span></div></li>
                <li class="active"><div class="folder-item"><i class="fas fa-brain"></i> <span>Prompt Lab</span></div></li>
            </ul>
        </nav>

        <!-- Main Content: Prompt Editor -->
        <main class="main-content">
            <div class="header">
                <h1>Prompt Lab 👨‍🔬</h1>
                <p>Customize the instructions that power your AI skills.</p>
            </div>

            <div class="editor-container">
                <div class="editor-header">
                    <div>
                        <select id="skill-select" class="skill-select" onchange="loadPrompt()">
                            <option value="email_summary">Email Summary Skill</option>
                            <option value="todo_extract">Todo Extraction Skill</option>
                        </select>
                        <span id="toast" class="toast"><i class="fas fa-check-circle"></i> 已保存</span>
                    </div>
                    <div class="btn-group">
                        <button class="btn-danger" onclick="restoreDefault()"><i class="fas fa-undo"></i> 恢复默认</button>
                        <button class="btn-primary" onclick="savePrompt()"><i class="fas fa-save"></i> 保存更新</button>
                    </div>
                </div>
                <textarea id="prompt-editor" spellcheck="false">Loading...</textarea>
            </div>
        </main>

        <!-- AI Chat Sidebar -->
        <section class="chat-container">
            <header class="chat-header">
                <div class="status-dot"></div>
                <h3>Prompt Meta-Skill</h3>
            </header>
            <div class="messages" id="chat-messages">
                <div class="message system">您好！我是您的 Prompt 领航员。请告诉我您想对左侧的指令做什么修改？比如“请帮我加一个只筛选英文内容的规则”。</div>
            </div>
            <div class="typing-indicator" id="typing-indicator">Meta-Skill 正在重写指令...</div>
            <div class="input-area">
                <form id="chat-form" class="input-wrapper" onsubmit="handleOptimize(event)">
                    <input type="text" id="user-input" placeholder="输入你想怎么改写代码..." autocomplete="off" required>
                    <button type="submit" id="send-btn">
                        <i class="fa-solid fa-magic"></i>
                    </button>
                </form>
            </div>
        </section>
    </div>

    <script>
        let currentPrompts = {};

        // 初始化加载所有 prompts
        async function fetchPrompts() {
            try {
                const res = await fetch('/api/prompts');
                const data = await res.json();
                
                // 转换为键值对形式
                data.forEach(item => {
                    currentPrompts[item.skill_name] = item.system_prompt;
                });
                
                loadPrompt();
            } catch (e) {
                console.error("加载失败:", e);
                document.getElementById('prompt-editor').value = "加载提示词失败。";
            }
        }

        function loadPrompt() {
            const skill = document.getElementById('skill-select').value;
            const editor = document.getElementById('prompt-editor');
            editor.value = currentPrompts[skill] || "No prompt found.";
        }

        async function savePrompt() {
            const skill = document.getElementById('skill-select').value;
            const content = document.getElementById('prompt-editor').value;
            
            try {
                const res = await fetch(`/api/prompts/${skill}`, {
                    method: 'PUT',
                    headers:{ 'Content-Type': 'application/json' },
                    body: JSON.stringify({ system_prompt: content })
                });
                if(res.ok) {
                    currentPrompts[skill] = content;
                    showToast();
                }
            } catch (e) {
                alert('保存失败!');
            }
        }

        async function restoreDefault() {
            if(!confirm("确定要恢复默认设定吗？这会覆盖所有的个性化修改。")) return;
            
            const skill = document.getElementById('skill-select').value;
            try {
                const res = await fetch(`/api/prompts/${skill}/restore`, { method: 'POST' });
                if(res.ok) {
                    await fetchPrompts(); // 刷新数据
                    showToast("已恢复默认");
                }
            } catch (e) {
                alert('恢复失败!');
            }
        }

        function showToast(msg = "已保存修改 (立刻生效)") {
            const toast = document.getElementById('toast');
            toast.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
            toast.style.display = 'inline-block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        // --- Chat Interaction ---
        function appendMessage(sender, text) {
            const container = document.getElementById('chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.innerText = text;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        async function handleOptimize(e) {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text) return;

            const skill = document.getElementById('skill-select').value;
            
            appendMessage('user', text);
            input.value = '';
            
            const btn = document.getElementById('send-btn');
            const indicator = document.getElementById('typing-indicator');
            btn.disabled = true;
            indicator.style.display = 'block';

            try {
                const res = await fetch(`/api/prompts/${skill}/optimize`, {
                    method: 'POST',
                    headers:{ 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_request: text })
                });
                
                if (!res.ok) {
                    appendMessage('system', '网络请求失败。');
                    return;
                }
                
                const editor = document.getElementById('prompt-editor');
                editor.value = ""; // 清空编辑器，准备流式写入
                
                // 自动插入一条占位系统消息
                const container = document.getElementById('chat-messages');
                const sysMsgDiv = document.createElement('div');
                sysMsgDiv.className = `message system`;
                sysMsgDiv.innerText = "正在为您重写左侧的系统指令...";
                container.appendChild(sysMsgDiv);
                container.scrollTop = container.scrollHeight;
                
                // 读取流
                const reader = res.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let done = false;
                let fullText = "";
                
                while (!done) {
                    const { value, done: readerDone } = await reader.read();
                    done = readerDone;
                    if (value) {
                        const chunk = decoder.decode(value, { stream: true });
                        fullText += chunk;
                        
                        // 过滤掉 markdown code blocks 标记
                        let displayText = fullText;
                        if (displayText.startsWith("```json\n")) displayText = displayText.substring(8);
                        else if (displayText.startsWith("```\n")) displayText = displayText.substring(4);
                        else if (displayText.startsWith("```")) displayText = displayText.substring(3);
                        // 我们在流式追加，所以只在结束时去结尾的 ``` 是可以的，这里为了实时好看，动态替换
                        if (displayText.endsWith("```")) displayText = displayText.slice(0, -3);
                        
                        // 仿佛魔法般地自动敲进左边的编辑器
                        editor.value = displayText;
                    }
                }
                
                // 简单的闪烁动画提醒由于输入完成
                editor.style.transition = 'background 0.3s';
                editor.style.background = '#e8f8f5';
                setTimeout(() => editor.style.background = '#fdfdfd', 800);
                
                // 结束系统提示
                sysMsgDiv.innerText = "重写完成！您可以审核并在右上方点击“保存更新”使其生效。";
                
            } catch (error) {
                appendMessage('system', '网络请求错误，请重试。: ' + error);
            } finally {
                btn.disabled = false;
                indicator.style.display = 'none';
            }
        }

        // 初始化
        fetchPrompts();
    </script>
</body>
</html>
