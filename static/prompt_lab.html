<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepMail AI - Prompt Lab</title>
    <link rel="stylesheet" href="/static/css/styles.css?v=2.2">
    <link rel="stylesheet" href="/static/css/prompt_lab.css?v=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <i class="fas fa-envelope-open-text"></i>
                <span>DeepMail</span>
            </div>
            <ul class="folder-list">
                <li onclick="window.location.href='/'"><div class="folder-item"><i class="fas fa-inbox"></i> <span>收件箱</span></div></li>
                <li onclick="window.location.href='/todo'"><div class="folder-item"><i class="fas fa-tasks"></i> <span>待办事项</span></div></li>
                <li class="active"><div class="folder-item"><i class="fas fa-brain"></i> <span>Prompt Lab</span></div></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="header">
                <h1>Prompt Lab 👨‍🔬</h1>
                <p>Customize the instructions that power your AI skills.</p>
            </div>

            <div class="editor-container">
                <div class="editor-header">
                    <div>
                        <select id="skill-select" class="skill-select" onchange="loadPrompt()">
                            <option value="email_summary">Email Summary Skill</option>
                            <option value="todo_extract">Todo Extraction Skill</option>
                        </select>
                        <span id="toast" class="toast"><i class="fas fa-check-circle"></i> 已保存</span>
                    </div>
                    <div class="btn-group">
                        <button class="btn-danger" onclick="restoreDefault()"><i class="fas fa-undo"></i> 恢复默认</button>
                        <button class="btn-primary" onclick="savePrompt()"><i class="fas fa-save"></i> 保存更新</button>
                    </div>
                </div>
                <textarea id="prompt-editor" spellcheck="false">Loading...</textarea>
            </div>
        </main>

        <!-- AI Chat Sidebar -->
        <section class="chat-container">
            <header class="chat-header">
                <div class="status-dot"></div>
                <h3>Prompt Meta-Skill</h3>
            </header>
            <div class="messages" id="chat-messages">
                <div class="message system">您好！我是您的 Prompt 领航员。请告诉我您想对左侧的指令做什么修改？</div>
            </div>
            <div class="typing-indicator" id="typing-indicator">Meta-Skill 正在重写指令...</div>
            <div class="input-area">
                <form id="chat-form" class="input-wrapper" onsubmit="handleOptimize(event)">
                    <input type="text" id="user-input" placeholder="输入你想怎么改写代码..." autocomplete="off" required>
                    <button type="submit" id="send-btn">
                        <i class="fa-solid fa-magic"></i>
                    </button>
                </form>
            </div>
        </section>
    </div>

    <script src="/static/js/prompt_lab.js?v=1.0"></script>
</body>
</html>
